[tasks.fix-permissions]
script = [
    "sudo chown -R 1000:1000 frames/"
]

[tasks.package-firmware]
description = "List firmware binaries available in release/"
script = [
    "echo 'Firmware binaries ready for deployment:'",
    "ls -lh ../firmware/release/*.bin 2>/dev/null || echo '  (none found — build firmware first)'"
]

[tasks.redeploy]
# dependencies = ["fix-permissions"]
dependencies = ["package-firmware"]
script = [
    "cargo build --release",
    "docker-compose build",
    "docker-compose up -d --remove-orphans"
]
